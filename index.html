<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Control Financiero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1f2436;
    --card: #232840;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #eef0f8;
    --muted: #7a7f9a;
    --green: #2ecc8f;
    --green-dim: rgba(46,204,143,0.13);
    --red: #f06070;
    --red-dim: rgba(240,96,112,0.13);
    --blue: #5b8dee;
    --blue-dim: rgba(91,141,238,0.13);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.13);
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }

  /* HEADER */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--green); }
  .month-selector { display: flex; align-items: center; gap: 10px; }
  .month-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .month-btn:active { background: var(--card); }
  .month-label { font-size: 14px; font-weight: 600; min-width: 110px; text-align: center; color: var(--text); }

  /* NAV TABS */
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.18s; }
  .nav-tab.active { background: var(--green); border-color: var(--green); color: #0f1117; }

  /* CONTENT */
  .content { padding: 16px; padding-bottom: 100px; }

  /* METRIC CARDS */
  .metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--card); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
  .metric-card.full { grid-column: 1/-1; }
  .metric-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }
  .metric-value.blue { color: var(--blue); }
  .metric-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-top: 5px; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }

  /* SECTION TITLE */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 4px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

  /* ADD FORM */
  .add-form { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border2); padding: 14px; margin-bottom: 16px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .form-field input, .form-field select, .form-field textarea {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px;
    font-family: var(--font); outline: none; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px var(--green-dim);
  }
  .form-field textarea { resize: none; height: 64px; font-size: 13px; }
  .form-field select option { background: #232840; }
  .btn-add { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; font-family: var(--font); transition: opacity 0.15s; }
  .btn-add:active { opacity: 0.8; }
  .btn-add.income { background: var(--green); color: #0f1117; }
  .btn-add.expense { background: var(--red); color: #fff; }

  /* ITEM LIST */
  .items-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 14px; position: relative; }
  .item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .item-left { flex: 1; min-width: 0; }
  .item-concepto { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-monto { font-size: 16px; font-weight: 700; font-family: var(--mono); }
  .item-monto.green { color: var(--green); }
  .item-monto.red { color: var(--red); }
  .item-note { font-size: 12px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.5; }
  .item-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 6px; }
  .item-del:active { color: var(--red); }
  .item-del-mode .item-del { display: flex; }

  /* CHART SECTION */
  .chart-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
  .chart-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 14px; }
  .chart-wrap { position: relative; width: 100%; height: 200px; }
  .chart-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* PROGRESS */
  .progress-list { display: flex; flex-direction: column; gap: 10px; }
  .prog-item { }
  .prog-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .prog-label { font-weight: 600; }
  .prog-val { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .prog-track { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }

  /* ALERT */
  .alert { border-radius: var(--radius-sm); padding: 11px 14px; font-size: 13px; margin-bottom: 12px; border-left: 3px solid; line-height: 1.5; }
  .alert-green { background: var(--green-dim); border-color: var(--green); color: #a8f0d0; }
  .alert-red { background: var(--red-dim); border-color: var(--red); color: #f9b0b8; }
  .alert-amber { background: var(--amber-dim); border-color: var(--amber); color: #f7d49a; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* RESUMEN ANUAL */
  .year-table { width: 100%; font-size: 12px; border-collapse: collapse; font-family: var(--mono); }
  .year-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 6px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  .year-table th:first-child { text-align: left; }
  .year-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); color: var(--text); text-align: right; font-size: 11px; }
  .year-table td:first-child { text-align: left; font-family: var(--font); font-size: 12px; font-weight: 600; }
  .year-table tr:last-child td { border-bottom: none; }
  .td-g { color: var(--green); }
  .td-r { color: var(--red); }
  .td-m { color: var(--muted); }

  /* FAB */
  .fab-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 99; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* ANIMATE */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .item-card { animation: fadeIn 0.2s ease; }

  /* TIPO TOGGLE */
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .type-btn { padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .type-btn.active-income { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .type-btn.active-expense { background: var(--red-dim); border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">Control <span>$</span></div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label">—</span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('resumen',this)">Resumen</button>
    <button class="nav-tab" onclick="showTab('ingresos',this)">Ingresos</button>
    <button class="nav-tab" onclick="showTab('gastos',this)">Gastos</button>
    <button class="nav-tab" onclick="showTab('graficas',this)">Gráficas</button>
    <button class="nav-tab" onclick="showTab('anual',this)">Anual</button>
  </div>
</div>

<div class="content" id="content"></div>

<script type="module" src="./src/js/main.js"></script>

</body>
</html>
