<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Control Financiero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1f2436;
    --card: #232840;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #eef0f8;
    --muted: #7a7f9a;
    --green: #2ecc8f;
    --green-dim: rgba(46,204,143,0.13);
    --red: #f06070;
    --red-dim: rgba(240,96,112,0.13);
    --blue: #5b8dee;
    --blue-dim: rgba(91,141,238,0.13);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.13);
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }

  /* HEADER */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .app-title span { color: var(--green); }
  .month-selector { display: flex; align-items: center; gap: 10px; }
  .month-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .month-btn:active { background: var(--card); }
  .month-label { font-size: 14px; font-weight: 600; min-width: 110px; text-align: center; color: var(--text); }

  /* NAV TABS */
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.18s; }
  .nav-tab.active { background: var(--green); border-color: var(--green); color: #0f1117; }

  /* CONTENT */
  .content { padding: 16px; padding-bottom: 100px; }

  /* METRIC CARDS */
  .metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--card); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
  .metric-card.full { grid-column: 1/-1; }
  .metric-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }
  .metric-value.blue { color: var(--blue); }
  .metric-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-top: 5px; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }

  /* SECTION TITLE */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 4px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

  /* ADD FORM */
  .add-form { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border2); padding: 14px; margin-bottom: 16px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .form-field input, .form-field select, .form-field textarea {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px;
    font-family: var(--font); outline: none; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px var(--green-dim);
  }
  .form-field textarea { resize: none; height: 64px; font-size: 13px; }
  .form-field select option { background: #232840; }
  .btn-add { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none;
    font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; font-family: var(--font); transition: opacity 0.15s; }
  .btn-add:active { opacity: 0.8; }
  .btn-add.income { background: var(--green); color: #0f1117; }
  .btn-add.expense { background: var(--red); color: #fff; }

  /* ITEM LIST */
  .items-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 14px; position: relative; }
  .item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .item-left { flex: 1; min-width: 0; }
  .item-concepto { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-monto { font-size: 16px; font-weight: 700; font-family: var(--mono); }
  .item-monto.green { color: var(--green); }
  .item-monto.red { color: var(--red); }
  .item-note { font-size: 12px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.5; }
  .item-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 6px; }
  .item-del:active { color: var(--red); }
  .item-del-mode .item-del { display: flex; }

  /* CHART SECTION */
  .chart-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
  .chart-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 14px; }
  .chart-wrap { position: relative; width: 100%; height: 200px; }
  .chart-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* PROGRESS */
  .progress-list { display: flex; flex-direction: column; gap: 10px; }
  .prog-item { }
  .prog-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .prog-label { font-weight: 600; }
  .prog-val { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .prog-track { height: 5px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }

  /* ALERT */
  .alert { border-radius: var(--radius-sm); padding: 11px 14px; font-size: 13px; margin-bottom: 12px; border-left: 3px solid; line-height: 1.5; }
  .alert-green { background: var(--green-dim); border-color: var(--green); color: #a8f0d0; }
  .alert-red { background: var(--red-dim); border-color: var(--red); color: #f9b0b8; }
  .alert-amber { background: var(--amber-dim); border-color: var(--amber); color: #f7d49a; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* RESUMEN ANUAL */
  .year-table { width: 100%; font-size: 12px; border-collapse: collapse; font-family: var(--mono); }
  .year-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 6px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  .year-table th:first-child { text-align: left; }
  .year-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); color: var(--text); text-align: right; font-size: 11px; }
  .year-table td:first-child { text-align: left; font-family: var(--font); font-size: 12px; font-weight: 600; }
  .year-table tr:last-child td { border-bottom: none; }
  .td-g { color: var(--green); }
  .td-r { color: var(--red); }
  .td-m { color: var(--muted); }

  /* FAB */
  .fab-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 99; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* ANIMATE */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .item-card { animation: fadeIn 0.2s ease; }

  /* TIPO TOGGLE */
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .type-btn { padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .type-btn.active-income { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .type-btn.active-expense { background: var(--red-dim); border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="app-title">Control <span>$</span></div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label">—</span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('resumen',this)">Resumen</button>
    <button class="nav-tab" onclick="showTab('ingresos',this)">Ingresos</button>
    <button class="nav-tab" onclick="showTab('gastos',this)">Gastos</button>
    <button class="nav-tab" onclick="showTab('graficas',this)">Gráficas</button>
    <button class="nav-tab" onclick="showTab('anual',this)">Anual</button>
  </div>
</div>

<div class="content" id="content"></div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const INCOME_CATS = ['Ventas','Servicios','Alquiler','Inversión','Freelance','Otro'];
const EXPENSE_CATS = ['Nómina','Arriendo','Servicios','Marketing','Logística','Tecnología','Impuestos','Alimentación','Transporte','Otro'];

let now = new Date();
let curYear = now.getFullYear();
let curMonth = now.getMonth();
let activeTab = 'resumen';
let chartInst = null;
let chartInst2 = null;

function key(y,m) { return `cf_${y}_${m}`; }
function load(y,m) { try { return JSON.parse(localStorage.getItem(key(y,m))) || {incomes:[],expenses:[]}; } catch(e){ return {incomes:[],expenses:[]}; } }
function save(y,m,data) { localStorage.setItem(key(y,m), JSON.stringify(data)); }
function getData() { return load(curYear, curMonth); }
function setData(d) { save(curYear, curMonth, d); }

const fmt = v => {
  if(Math.abs(v)>=1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if(Math.abs(v)>=1000) return '$'+(v/1000).toFixed(0)+'K';
  return '$'+Math.round(v).toLocaleString('es-CO');
};
const fmtFull = v => '$'+Math.round(v).toLocaleString('es-CO');
const totalI = d => d.incomes.reduce((s,i)=>s+i.monto,0);
const totalE = d => d.expenses.reduce((s,e)=>s+e.monto,0);
const margin = d => { const ti=totalI(d),te=totalE(d); return ti>0?(ti-te)/ti*100:0; };

function changeMonth(dir) {
  curMonth += dir;
  if(curMonth > 11) { curMonth=0; curYear++; }
  if(curMonth < 0) { curMonth=11; curYear--; }
  render();
}

function showTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}

function render() {
  document.getElementById('month-label').textContent = MONTHS[curMonth]+' '+curYear;
  const tabs = { resumen, ingresos, gastos, graficas, anual };
  const fn = tabs[activeTab];
  if(fn) fn();
}

// ─── RESUMEN ──────────────────────────────────────────────────────────────
function resumen() {
  const d = getData();
  const ti = totalI(d), te = totalE(d), util = ti-te, m = margin(d);
  const mClass = util>=0?'green':'red';
  const mBadge = util>=0?'badge-green':'badge-red';
  const marginBadge = m>=30?'badge-green':m>=10?'badge-amber':'badge-red';
  const marginLabel = m>=30?'Saludable':m>=10?'Moderado':'Riesgo';

  // alerts
  let alertHTML = '';
  if(ti===0 && te===0) alertHTML = `<div class="alert alert-amber">Sin registros este mes. Ve a Ingresos o Gastos para agregar.</div>`;
  else if(util<0) alertHTML = `<div class="alert alert-red">Los gastos superan los ingresos en ${fmtFull(Math.abs(util))}.</div>`;
  else if(m<15) alertHTML = `<div class="alert alert-amber">Margen bajo (${m.toFixed(1)}%). Revisa los gastos variables.</div>`;
  else alertHTML = `<div class="alert alert-green">Margen ${m.toFixed(1)}% — finanzas estables este mes.</div>`;

  // top gastos
  const byCat = {};
  d.expenses.forEach(e=>{ byCat[e.cat]=(byCat[e.cat]||0)+e.monto; });
  const sorted = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const bars = sorted.map(([cat,val])=>{
    const p = ti>0?(val/ti*100):0;
    const cls = p>30?'#f06070':p>15?'#f5a623':'#2ecc8f';
    return `<div class="prog-item">
      <div class="prog-head"><span class="prog-label">${cat}</span><span class="prog-val">${fmt(val)} · ${p.toFixed(1)}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.min(p,100)}%;background:${cls}"></div></div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Ingresos</div>
        <div class="metric-value green">${fmt(ti)}</div>
        <span class="metric-badge badge-green">${d.incomes.length} registros</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">Gastos</div>
        <div class="metric-value red">${fmt(te)}</div>
        <span class="metric-badge badge-red">${d.expenses.length} registros</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">Utilidad neta</div>
        <div class="metric-value ${mClass}">${fmt(util)}</div>
        <span class="metric-badge ${mBadge}">${util>=0?'Ganancia':'Pérdida'}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">Margen neto</div>
        <div class="metric-value blue">${m.toFixed(1)}%</div>
        <span class="metric-badge ${marginBadge}">${marginLabel}</span>
      </div>
    </div>
    ${alertHTML}
    ${sorted.length ? `
    <div class="section-head"><span class="section-title">Distribución de gastos</span></div>
    <div class="chart-card"><div class="progress-list">${bars}</div></div>
    ` : ''}
  `;
}

// ─── INGRESOS ──────────────────────────────────────────────────────────────
function ingresos() {
  const d = getData();
  const ti = totalI(d);
  const list = d.incomes.slice().reverse().map((item, ri)=>{
    const i = d.incomes.length - 1 - ri;
    const pct = ti>0?(item.monto/ti*100).toFixed(1):'0';
    return `<div class="item-card">
      <button class="item-del" onclick="delItem('incomes',${i})">×</button>
      <div class="item-top">
        <div class="item-left">
          <div class="item-concepto">${item.concepto}</div>
          <div class="item-meta">${item.cat} · ${pct}% del total</div>
        </div>
        <div class="item-right">
          <div class="item-monto green">${fmtFull(item.monto)}</div>
        </div>
      </div>
      ${item.nota ? `<div class="item-note">📝 ${item.nota}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="add-form">
      <div class="type-toggle" style="display:block;margin-bottom:0;">
        <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px;">+ Nuevo ingreso</div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Concepto</label>
          <input id="i-con" placeholder="Ej: Venta producto X" autocomplete="off"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Categoría</label>
          <select id="i-cat">${INCOME_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        </div>
        <div class="form-field">
          <label>Monto ($)</label>
          <input id="i-mon" type="number" inputmode="numeric" placeholder="0" min="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Nota (opcional)</label>
          <textarea id="i-not" placeholder="Agrega detalles, cliente, referencia..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <button class="btn-add income" onclick="addItem('incomes')">Guardar ingreso</button>
        </div>
      </div>
    </div>
    <div class="section-head">
      <span class="section-title">Registros — ${MONTHS[curMonth]}</span>
      <span style="font-size:12px;color:var(--green);font-family:var(--mono);font-weight:600;">${fmtFull(ti)}</span>
    </div>
    ${d.incomes.length ? `<div class="items-list">${list}</div>` : `<div class="empty"><div class="empty-icon">💰</div>Sin ingresos registrados este mes.</div>`}
  `;
}

// ─── GASTOS ──────────────────────────────────────────────────────────────
function gastos() {
  const d = getData();
  const te = totalE(d);
  const list = d.expenses.slice().reverse().map((item, ri)=>{
    const i = d.expenses.length - 1 - ri;
    const ti = totalI(d);
    const pct = ti>0?(item.monto/ti*100).toFixed(1):'—';
    const impact = ti>0?(item.monto/ti*100):0;
    const badge = impact>30?'badge-red':impact>15?'badge-amber':'badge-green';
    const label = impact>30?'Alto':impact>15?'Medio':'Bajo';
    return `<div class="item-card">
      <button class="item-del" onclick="delItem('expenses',${i})">×</button>
      <div class="item-top">
        <div class="item-left">
          <div class="item-concepto">${item.concepto}</div>
          <div class="item-meta">${item.cat} · <span class="metric-badge ${badge}" style="font-size:9px;padding:1px 6px;">${label}</span></div>
        </div>
        <div class="item-right">
          <div class="item-monto red">${fmtFull(item.monto)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${pct}% ingresos</div>
        </div>
      </div>
      ${item.nota ? `<div class="item-note">📝 ${item.nota}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="add-form">
      <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:12px;">+ Nuevo gasto</div>
      <div class="form-row">
        <div class="form-field">
          <label>Concepto</label>
          <input id="e-con" placeholder="Ej: Arriendo oficina" autocomplete="off"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Categoría</label>
          <select id="e-cat">${EXPENSE_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
        </div>
        <div class="form-field">
          <label>Monto ($)</label>
          <input id="e-mon" type="number" inputmode="numeric" placeholder="0" min="0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Nota (opcional)</label>
          <textarea id="e-not" placeholder="Proveedor, factura, observación..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <button class="btn-add expense" onclick="addItem('expenses')">Guardar gasto</button>
        </div>
      </div>
    </div>
    <div class="section-head">
      <span class="section-title">Registros — ${MONTHS[curMonth]}</span>
      <span style="font-size:12px;color:var(--red);font-family:var(--mono);font-weight:600;">${fmtFull(te)}</span>
    </div>
    ${d.expenses.length ? `<div class="items-list">${list}</div>` : `<div class="empty"><div class="empty-icon">📋</div>Sin gastos registrados este mes.</div>`}
  `;
}

// ─── GRÁFICAS ──────────────────────────────────────────────────────────────
function graficas() {
  const d = getData();
  document.getElementById('content').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">Ingresos vs Gastos</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2ecc8f"></div>Ingresos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f06070"></div>Gastos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#5b8dee"></div>Utilidad</div>
      </div>
      <div class="chart-wrap" style="height:220px;"><canvas id="chart1"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Distribución de gastos por categoría</div>
      <div class="chart-wrap" style="height:220px;"><canvas id="chart2"></canvas></div>
    </div>
  `;
  renderCharts(d);
}

function renderCharts(d) {
  const ti = totalI(d), te = totalE(d);
  const c1 = document.getElementById('chart1');
  if(c1) {
    if(chartInst){chartInst.destroy();chartInst=null;}
    chartInst = new Chart(c1, {
      type:'bar',
      data:{
        labels:['Ingresos','Gastos','Utilidad'],
        datasets:[{
          data:[ti,te,ti-te],
          backgroundColor:['rgba(46,204,143,0.7)','rgba(240,96,112,0.7)',ti-te>=0?'rgba(91,141,238,0.7)':'rgba(240,96,112,0.5)'],
          borderColor:['#2ecc8f','#f06070',ti-te>=0?'#5b8dee':'#f06070'],
          borderWidth:1, borderRadius:8
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7a7f9a',font:{size:11}}},
          y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#7a7f9a',font:{size:10},callback:v=>fmt(v)}}
        }
      }
    });
  }
  const byCat={};
  d.expenses.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+e.monto;});
  const catLabels = Object.keys(byCat);
  const catVals = Object.values(byCat);
  const COLORS = ['#f06070','#f5a623','#5b8dee','#2ecc8f','#b07fd4','#5ecce0','#f0a060','#60c0f0'];
  const c2 = document.getElementById('chart2');
  if(c2 && catLabels.length) {
    if(chartInst2){chartInst2.destroy();chartInst2=null;}
    chartInst2 = new Chart(c2, {
      type:'doughnut',
      data:{
        labels:catLabels,
        datasets:[{data:catVals,backgroundColor:COLORS.slice(0,catLabels.length),borderWidth:0,hoverOffset:6}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{position:'bottom',labels:{color:'#7a7f9a',font:{size:11},padding:12,boxWidth:10,boxHeight:10}},
          tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmtFull(ctx.raw)}}
        },
        cutout:'65%'
      }
    });
  } else if(c2) {
    const ctx2 = c2.getContext('2d');
    ctx2.fillStyle='#7a7f9a';
    ctx2.font='14px Sora';
    ctx2.textAlign='center';
    ctx2.fillText('Sin gastos registrados',c2.width/2,c2.height/2);
  }
}

// ─── ANUAL ──────────────────────────────────────────────────────────────
function anual() {
  let rows = '';
  let sumI=0, sumE=0;
  MONTHS.forEach((m,i)=>{
    const d = load(curYear, i);
    const ti=totalI(d), te=totalE(d), util=ti-te, mg=ti>0?(util/ti*100):0;
    sumI+=ti; sumE+=te;
    const active = i===curMonth ? 'style="background:rgba(46,204,143,0.06)"' : '';
    rows += `<tr ${active}>
      <td>${m.substring(0,3)}</td>
      <td class="td-g">${fmt(ti)}</td>
      <td class="td-r">${fmt(te)}</td>
      <td class="${util>=0?'td-g':'td-r'}">${fmt(util)}</td>
      <td class="td-m">${ti>0?mg.toFixed(0)+'%':'—'}</td>
    </tr>`;
  });
  const sumUtil=sumI-sumE;
  const sumMg=sumI>0?(sumUtil/sumI*100):0;
  document.getElementById('content').innerHTML = `
    <div class="section-head"><span class="section-title">Resumen ${curYear}</span></div>
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Total ingresos</div>
        <div class="metric-value green">${fmt(sumI)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total gastos</div>
        <div class="metric-value red">${fmt(sumE)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Utilidad anual</div>
        <div class="metric-value ${sumUtil>=0?'green':'red'}">${fmt(sumUtil)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Margen promedio</div>
        <div class="metric-value blue">${sumMg.toFixed(1)}%</div>
      </div>
    </div>
    <div class="chart-card" style="overflow-x:auto;">
      <table class="year-table">
        <thead><tr><th>Mes</th><th>Ingresos</th><th>Gastos</th><th>Utilidad</th><th>Margen</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px;">Mes actual resaltado en verde · Toca un mes en el selector para ver detalle</div>
  `;
}

// ─── CRUD ──────────────────────────────────────────────────────────────
function addItem(type) {
  const isIncome = type==='incomes';
  const con = document.getElementById(isIncome?'i-con':'e-con').value.trim();
  const cat = document.getElementById(isIncome?'i-cat':'e-cat').value;
  const mon = parseFloat(document.getElementById(isIncome?'i-mon':'e-mon').value);
  const not = document.getElementById(isIncome?'i-not':'e-not').value.trim();
  if(!con){ alert('Agrega un concepto.'); return; }
  if(isNaN(mon)||mon<=0){ alert('Agrega un monto válido.'); return; }
  const d = getData();
  d[type].push({ concepto:con, cat, monto:mon, nota:not, fecha: new Date().toLocaleDateString('es-CO') });
  setData(d);
  render();
}
function delItem(type, i) {
  if(!confirm('¿Eliminar este registro?')) return;
  const d = getData();
  d[type].splice(i,1);
  setData(d);
  render();
}

// Soporte Enter en campos
document.addEventListener('keydown', e => {
  if(e.key==='Enter' && e.target.tagName==='INPUT') {
    if(activeTab==='ingresos') addItem('incomes');
    else if(activeTab==='gastos') addItem('expenses');
  }
});

render();
</script>
